name: Build GT720 Docker Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'gt720-cuda35.Dockerfile'
      - '.github/workflows/build-gt720.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'gt720-cuda35.Dockerfile'
      - '.github/workflows/build-gt720.yml'
  workflow_dispatch:

env:
  DOCKERHUB_REPO: wuyong1977/llama_b9253

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: wuyong1977
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=raw,value=gt720-cuda35
            type=sha,prefix=gt720-cuda35-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gt720-cuda35.Dockerfile
          target: server
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
